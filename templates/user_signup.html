
<!DOCTYPE html>
<html>
<head>
    <title>User Signup</title>
     <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h2>User Signup</h2>

<form method="POST">

    <input type="text"
           name="name"
           placeholder="Enter Name"
           required><br><br>

    <input type="email"
           name="email"
           placeholder="Enter Email"
           required><br><br>

    <input type="password"
           name="password"
           placeholder="Enter Password"
           required><br><br>

    <button type="submit">
        Signup
    </button>

</form>

<a href="/user_login">Already Have Account?</a>

</body>
</html>
